<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title th:text="${mode == 'create' ? 'Create Course' : 'Edit Course'}">Course Form</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/header :: sidebar"></div>

<main>
  <h1>CourseApp</h1>
  <h2 th:if="${mode == 'create'}">Create Course</h2>
  <h2 th:unless="${mode == 'create'}">Edit Course</h2>

  <!-- CREATE FORM -->
  <form th:if="${mode == 'create'}"
        th:action="@{/courses}"
        method="post"
        th:object="${course}">

    <div>
      <label for="title-create">Title</label>
      <input id="title-create"
             type="text"
             th:field="*{title}"
             th:classappend="${#fields.hasErrors('title')} ? ' input-error' : ''">
      <div class="error-message"
           th:if="${#fields.hasErrors('title')}"
           th:errors="*{title}"></div>
    </div>

    <div>
      <label for="instructor-create">Instructor</label>
      <input id="instructor-create"
             type="text"
             th:field="*{instructor}"
             th:classappend="${#fields.hasErrors('instructor')} ? ' input-error' : ''">
      <div class="error-message"
           th:if="${#fields.hasErrors('instructor')}"
           th:errors="*{instructor}"></div>
    </div>

    <div class="form-actions">
      <button type="submit">Create</button>
      <a th:href="@{/courses}" class="cancel-link">Cancel</a>
    </div>
  </form>

  <!-- EDIT FORM -->
  <form th:unless="${mode == 'create'}"
        th:action="@{/courses/{id}(id=${course.id})}"
        method="post"
        th:object="${course}">

    <div>
      <label for="title-edit">Title</label>
      <input id="title-edit"
             type="text"
             th:field="*{title}"
             th:classappend="${#fields.hasErrors('title')} ? ' input-error' : ''">
      <div class="error-message"
           th:if="${#fields.hasErrors('title')}"
           th:errors="*{title}"></div>
    </div>

    <div>
      <label for="instructor-edit">Instructor</label>
      <input id="instructor-edit"
             type="text"
             th:field="*{instructor}"
             th:classappend="${#fields.hasErrors('instructor')} ? ' input-error' : ''">
      <div class="error-message"
           th:if="${#fields.hasErrors('instructor')}"
           th:errors="*{instructor}"></div>
    </div>

    <div class="form-actions">
      <button type="submit">Save</button>
      <a th:href="@{/courses}" class="cancel-link">Cancel</a>
    </div>
  </form>
</main>

</body>
</html>
